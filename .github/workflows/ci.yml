name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Run DDMCore tests
        run: swift test -v
